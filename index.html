<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Row Archive</title>

  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }

    /* ヘッダー */
    header {
      text-align: center;
      padding: 30px 10px 20px;
      border-bottom: 1px solid #222;
    }

    /* ロゴ（←ここ調整済み） */
    .logo {
      width: 100%;
      max-width: 260px;
      height: auto;
      margin-bottom: 10px;
    }

    /* メイン */
    .main {
      padding: 20px;
      text-align: center;
    }

    .main h1 {
      font-size: 22px;
      margin-bottom: 8px;
      letter-spacing: 3px;
    }

    .main p {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 30px;
    }

    /* ボタン（高級感寄せ） */
    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 12px auto;
      padding: 14px;
      border: 1px solid #fff;
      text-decoration: none;
      color: #fff;
      font-size: 15px;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background-color: #fff;
      color: #000;
    }

    /* フッター固定 */
    .footer-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0a0a0a;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }

    .footer-bar a {
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
    }

  </style>
</head>

<body>

  <!-- ヘッダー -->
  <header>
    <!-- ★ここが今回の重要ポイント -->
    <img src="The Row Archive Logo.jpg" alt="The Row Archive Logo" class="logo">
  </header>

  <!-- メイン -->
  <div class="main">
    <h1>THE ROW ARCHIVE</h1>
    <p>ポーカー × アミューズメント団体予約サービス</p>

    <a href="#" class="btn">サービスを見る</a>
    <a href="#" class="btn">店舗一覧</a>
    <a href="#" class="btn">お問い合わせ</a>
  </div>

  <!-- フッター -->
  <div class="footer-bar">
    <a href="#">電話</a>
    <a href="#">LINE</a>
    <a href="#">予約</a>
  </div>

</body>
</html>
